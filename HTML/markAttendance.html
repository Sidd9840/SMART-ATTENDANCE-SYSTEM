<!DOCTYPE html>
<html>
<head>
    <title>Mark My Attendance</title>
    <link rel="stylesheet" href="../CSS/style1.css">
</head>

<body>

<div class="hero">

<div class="content">

<h1>📍 Mark My Attendance</h1>

<div class="dashboard-cards">

    <div class="card">
        <h3>Name</h3>
        <h2 id="studentName"></h2>
    </div>

    <div class="card">
        <h3>Roll No</h3>
        <h2 id="rollNo"></h2>
    </div>

    <div class="card">
        <h3>Course</h3>
        <h2 id="course"></h2>
    </div>

    <div class="card">
        <h3>Location Status</h3>
        <h2 id="locationStatus">Checking...</h2>
    </div>

    <div class="card">
        <h3>Distance</h3>
        <h2 id="distance">0 Meter</h2>
    </div>

</div>

<div class="buttons">

<button id="saveBtn" onclick="saveAttendance()" disabled>

✅ Mark Attendance

</button>

</div>

<div class="buttons">

<a href="studentDashboard.html">

<button>

⬅ Back

</button>

</a>

</div>

</div>

</div>

<script src="../JS/markAttendance.js"></script>

</body>
</html>
