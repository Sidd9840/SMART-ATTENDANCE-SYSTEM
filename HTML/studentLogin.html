<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link rel="stylesheet" href="../CSS/style1.css">
</head>
<body>

<div class="hero">
    <div class="content">

        <h1>Student Login</h1>
        <p>Login to mark attendance</p>

        <form id="loginForm" class="loginForm">

            <input
                type="text"
                id="username"
                placeholder="Enter Roll Number"
                required>

            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required>

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            <a href="../index.html">← Back to Home</a>
        </p>

    </div>
</div>

<script src="../JS/studentLogin.js"></script>

</body>
</html>
