<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <link rel="stylesheet" href="../CSS/style1.css">
</head>
<body>
    
<div class="hero">

    <div class="content">

        <h1>Add Student</h1>

        <p>Enter student details below</p>

        <form id="studentForm">

            <input type="text"
                   id="studentName"
                   placeholder="Student Name"
                   required>

            <input type="text"
                   id="roll"
                   placeholder="Roll Number"
                   required>

            <input type="text"
                   id="course"
                   placeholder="Course"
                   required>

            <input type="email"
                   id="email"
                   placeholder="Email"
                   required>

            <div class="buttons">
                <button type="submit">
                    Add Student
                </button>
            </div>

        </form>

        <div class="buttons">
            <a href="dashboard.html">
                <button type="button">
                    Back to Dashboard
                </button>
            </a>
        </div>

    </div>

</div>

<script src="../JS/addStudent.js"></script>

</body>
</html>
